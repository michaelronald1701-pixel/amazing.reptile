<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amazing Reptile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

button{
padding:8px 12px;
border:none;
background:black;
color:white;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

button:hover{
opacity:0.8;
}

.editBox{
display:none;
background:#eee;
padding:10px;
margin-top:10px;
border-radius:5px;
}

input{
width:100%;
padding:6px;
margin-top:5px;
}

</style>

</head>

<body>

<header>
<h2>Amazing Reptile</h2>
<div>Premium Leopard Gecko Breeder</div>
</header>

<div class="container">

<h2>Available Gecko</h2>

<div id="products" class="grid"></div>

</div>

<script>

let products=[

{
name:"Tangerine Inferno",
price:3500000,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg"
},

{
name:"Mack Snow Eclipse",
price:2800000,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg"
},

{
name:"Super Hypo",
price:5000000,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg"
}

]

function render(){

const container=document.getElementById("products")
container.innerHTML=""

products.forEach((p,i)=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${p.img}">

<div class="card-body">

<h3>${p.name}</h3>

<p>Harga: Rp ${p.price.toLocaleString()}</p>

<button onclick="orderWhatsApp('${p.name}',${p.price})">
Order via WhatsApp
</button>

<button onclick="toggleEdit(${i})">
Edit
</button>

<div class="editBox" id="edit${i}">

<input id="name${i}" value="${p.name}" placeholder="Nama Gecko">

<input id="price${i}" value="${p.price}" placeholder="Harga">

<input id="img${i}" value="${p.img}" placeholder="Link Foto">

<button onclick="saveEdit(${i})">Save</button>

</div>

</div>

`

container.appendChild(card)

})

}

function toggleEdit(i){

let box=document.getElementById("edit"+i)

if(box.style.display==="block"){
box.style.display="none"
}else{
box.style.display="block"
}

}

function saveEdit(i){

products[i].name=document.getElementById("name"+i).value
products[i].price=document.getElementById("price"+i).value
products[i].img=document.getElementById("img"+i).value

render()

}

function orderWhatsApp(name,price){

let phone="6283805174938"

let message=`Halo Amazing Reptile, saya ingin membeli ${name} dengan harga Rp ${price}`

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url,'_blank')

}

render()

</script>

</body>
</html>
