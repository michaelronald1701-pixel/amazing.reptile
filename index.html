<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amazing Reptile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
background:url("https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg");
background-size:cover;
background-position:center;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* SEARCH */

.search{
margin-bottom:25px;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#00ff9d;
font-weight:bold;
}

button{
padding:10px 15px;
border:none;
background:#00ff9d;
color:black;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

.badge{
display:inline-block;
padding:5px 8px;
background:#00ff9d;
color:black;
border-radius:5px;
font-size:12px;
margin-bottom:5px;
}

.sold{
background:red;
color:white;
}

/* DETAIL MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:1000;
}

.modal-content{
background:#111;
padding:20px;
border-radius:10px;
max-width:800px;
width:90%;
}

.gallery{
display:flex;
gap:10px;
margin-top:10px;
}

.gallery img{
width:100px;
height:80px;
object-fit:cover;
cursor:pointer;
}

/* LIGHTBOX */

.lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
z-index:2000;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

/* ADMIN */

.editBox{
display:none;
background:#222;
padding:10px;
margin-top:10px;
}

input,select{
width:100%;
padding:6px;
margin-top:5px;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
background:black;
margin-top:40px;
}

</style>
</head>

<body>

<nav>

<h2>Amazing Reptile</h2>

<div>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</div>

</nav>

<div class="hero">
<h1>Premium Leopard Gecko Breeder</h1>
</div>

<div class="container">

<div style="margin-bottom:20px;">
<button onclick="adminLogin()">Admin Login</button>
<button onclick="addProduct()" id="addBtn" style="display:none;">Tambah Gecko</button>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="Search Gecko..." onkeyup="render()">
</div>

<div id="products" class="grid"></div>

</div>

<!-- DETAIL MODAL -->

<div id="detailModal" class="modal" onclick="closeModal()">

<div class="modal-content" onclick="event.stopPropagation()">

<h2 id="detailName"></h2>
<p id="detailPrice"></p>

<img id="mainImage" style="width:100%;max-height:400px;object-fit:cover;cursor:pointer;">

<div id="gallery" class="gallery"></div>

<button id="orderBtn"></button>

</div>

</div>

<!-- LIGHTBOX -->

<div id="lightbox" class="lightbox" onclick="closeLightbox()">
<img id="lightboxImg">
</div>

<footer>

<p>© 2026 Amazing Reptile</p>

</footer>

<script>

let admin=false
const password="123456"

let products=JSON.parse(localStorage.getItem("geckoProducts")) || []

if(products.length===0){

products=[

{
name:"Super Hypo Tangerine",
price:1500000,
images:[
"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg"
],
status:"available"
}

]

saveData()

}

function saveData(){
localStorage.setItem("geckoProducts",JSON.stringify(products))
}

function adminLogin(){

let input=prompt("Password Admin")

if(input===password){

admin=true
alert("Admin Mode Aktif")
document.getElementById("addBtn").style.display="inline-block"

render()

}

}

function addProduct(){

products.push({
name:"Gecko Baru",
price:0,
images:[],
status:"available"
})

saveData()
render()

}

function render(){

const container=document.getElementById("products")
container.innerHTML=""

let search=document.getElementById("searchInput").value.toLowerCase()

products.sort((a,b)=>a.status==="sold"?1:-1)

products.forEach((p,i)=>{

if(!p.name.toLowerCase().includes(search)) return

let badge=p.status==="sold"
?'<div class="badge sold">SOLD</div>'
:'<div class="badge">AVAILABLE</div>'

let img=p.images[0] || ""

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${img}">

<div class="card-body">

${badge}

<h3>${p.name}</h3>

<p class="price">Rp ${Number(p.price).toLocaleString()}</p>

</div>

`

card.onclick=()=>openDetail(i)

container.appendChild(card)

})

}

function openDetail(i){

let p=products[i]

document.getElementById("detailName").innerText=p.name
document.getElementById("detailPrice").innerText="Rp "+Number(p.price).toLocaleString()

let main=p.images[0] || ""

document.getElementById("mainImage").src=main

document.getElementById("mainImage").onclick=()=>openLightbox(main)

let gallery=document.getElementById("gallery")

gallery.innerHTML=""

p.images.forEach(img=>{

let g=document.createElement("img")

g.src=img

g.onclick=()=>{
document.getElementById("mainImage").src=img
}

gallery.appendChild(g)

})

let order=p.status==="sold"
?'<button disabled style="background:gray;">Sold Out</button>'
:`<button onclick="orderWhatsApp('${p.name}',${p.price})">Order WhatsApp</button>`

document.getElementById("orderBtn").outerHTML=order

document.getElementById("detailModal").style.display="flex"

}

function closeModal(){
document.getElementById("detailModal").style.display="none"
}

function openLightbox(src){

document.getElementById("lightboxImg").src=src
document.getElementById("lightbox").style.display="flex"

}

function closeLightbox(){

document.getElementById("lightbox").style.display="none"

}

function orderWhatsApp(name,price){

let phone="6283805174938"

let message=`Halo Amazing Reptile, saya ingin membeli ${name} harga Rp ${price}`

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url,'_blank')

}

render()

</script>

</body>
</html>
