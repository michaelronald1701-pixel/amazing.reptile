<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Amazing Reptile</title>

<style>

/* ===== BODY ===== */

body{
font-family:Arial, sans-serif;
margin:0;
background:#0f0f0f;
color:white;
}

/* ===== NAVBAR ===== */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* ===== HERO ===== */

.hero{
text-align:center;
padding:80px 20px;
background:url("https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

/* ===== CONTAINER ===== */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* ===== SEARCH ===== */

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
outline:none;
}

/* ===== GRID ===== */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* ===== CARD ===== */

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
cursor:pointer;
}

/* ===== CARD BODY ===== */

.card-body{
padding:15px;
}

.price{
color:#00ff9d;
font-weight:bold;
}

.desc{
font-size:14px;
color:#ccc;
margin-top:5px;
}

/* ===== BUTTON ===== */

button{
padding:10px 15px;
border:none;
background:#00ff9d;
color:black;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-weight:bold;
}

button:hover{
background:#00cc7a;
}

/* ===== BADGE ===== */

.badge{
display:inline-block;
padding:5px 8px;
background:#00ff9d;
color:black;
border-radius:5px;
font-size:12px;
margin-bottom:5px;
}

.sold{
background:red;
color:white;
}

/* ===== ADMIN ===== */

.admin{
margin-bottom:20px;
}

.editBox{
display:none;
background:#222;
padding:10px;
margin-top:10px;
border-radius:6px;
}

input, textarea, select{
width:100%;
padding:6px;
margin-top:5px;
border-radius:4px;
border:none;
}

textarea{
height:60px;
}

/* ===== IMAGE ZOOM ===== */

#lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
justify-content:center;
align-items:center;
z-index:1000;
}

#lightbox img{
max-width:90%;
max-height:90%;
}

</style>

</head>

<body>

<!-- ===== NAVBAR ===== -->

<nav>

<h2>Amazing Reptile</h2>

<div>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</div>

</nav>

<!-- ===== HERO ===== -->

<div class="hero">

<h1>Premium Leopard Gecko Breeder</h1>
<p>Healthy • High Quality Morphs</p>

</div>

<!-- ===== CONTENT ===== -->

<div class="container">

<div class="admin">
<button onclick="adminLogin()">Admin Login</button>
<button onclick="addProduct()" id="addBtn" style="display:none;">Tambah Gecko</button>
</div>

<div class="search">
<input id="searchBox" placeholder="Search Gecko..." onkeyup="render()">
</div>

<div id="products" class="grid"></div>

</div>

<!-- ===== LIGHTBOX ===== -->

<div id="lightbox" onclick="closeZoom()">
<img id="zoomImg">
</div>

<script>

/* ===== GLOBAL ===== */

let admin=false
const password="123456"

let products = JSON.parse(localStorage.getItem("geckoProducts")) || []

/* ===== DEFAULT DATA ===== */

if(products.length===0){

products=[{
name:"Super Hypo Tangerine",
price:1500000,
desc:"High quality morph, healthy and ready to ship.",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg",
status:"available"
}]

saveData()

}

/* ===== SAVE LOCAL STORAGE ===== */

function saveData(){
localStorage.setItem("geckoProducts",JSON.stringify(products))
}

/* ===== ADMIN LOGIN ===== */

function adminLogin(){

let input=prompt("Password Admin")

if(input===password){

admin=true
alert("Admin Mode Aktif")

document.getElementById("addBtn").style.display="inline-block"

render()

}else{

alert("Password salah")

}

}

/* ===== ADD PRODUCT ===== */

function addProduct(){

products.push({
name:"Gecko Baru",
price:0,
desc:"Keterangan gecko...",
img:"",
status:"available"
})

saveData()
render()

}

/* ===== RENDER PRODUCTS ===== */

function render(){

const container=document.getElementById("products")
container.innerHTML=""

let search=document.getElementById("searchBox").value.toLowerCase()

products.forEach((p,i)=>{

if(!p.name.toLowerCase().includes(search)) return

let badge = p.status==="sold"
? '<div class="badge sold">SOLD</div>'
: '<div class="badge">AVAILABLE</div>'

let orderBtn = p.status==="sold"
? `<button disabled style="background:gray;">Sold Out</button>`
: `<button onclick="orderWhatsApp('${p.name}',${p.price})">Order WhatsApp</button>`

let adminButtons=""
let editBox=""

if(admin){

adminButtons=`
<button onclick="toggleEdit(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Hapus</button>
`

editBox=`

<div class="editBox" id="edit${i}">

<input id="name${i}" value="${p.name}" placeholder="Nama Gecko">
<input id="price${i}" value="${p.price}" placeholder="Harga">
<textarea id="desc${i}" placeholder="Deskripsi">${p.desc}</textarea>

<select id="status${i}">
<option value="available" ${p.status==="available"?"selected":""}>Available</option>
<option value="sold" ${p.status==="sold"?"selected":""}>Sold</option>
</select>

<input type="file" onchange="uploadImage(event,${i})">

<button onclick="saveEdit(${i})">Save</button>

</div>
`

}

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<img src="${p.img || 'https://via.placeholder.com/400x300?text=No+Image'}"
onclick="zoomImage('${p.img}')">

<div class="card-body">

${badge}

<h3>${p.name}</h3>

<p class="price">Rp ${Number(p.price).toLocaleString()}</p>

<p class="desc">${p.desc}</p>

${orderBtn}

${adminButtons}

${editBox}

</div>
`

container.appendChild(card)

})

}

/* ===== EDIT PRODUCT ===== */

function toggleEdit(i){

let box=document.getElementById("edit"+i)

box.style.display =
box.style.display==="block"
? "none"
: "block"

}

function saveEdit(i){

products[i].name=document.getElementById("name"+i).value
products[i].price=document.getElementById("price"+i).value
products[i].desc=document.getElementById("desc"+i).value
products[i].status=document.getElementById("status"+i).value

saveData()
render()

}

/* ===== DELETE PRODUCT ===== */

function deleteProduct(i){

if(confirm("Hapus gecko ini?")){

products.splice(i,1)

saveData()
render()

}

}

/* ===== UPLOAD IMAGE ===== */

function uploadImage(event,i){

const file=event.target.files[0]
if(!file) return

const reader=new FileReader()

reader.onload=function(e){

products[i].img=e.target.result

saveData()
render()

}

reader.readAsDataURL(file)

}

/* ===== WHATSAPP ORDER ===== */

function orderWhatsApp(name,price){

let phone="6283805174938"

let message=`Halo Amazing Reptile, saya ingin membeli ${name} harga Rp ${price}`

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url,'_blank')

}

/* ===== IMAGE ZOOM ===== */

function zoomImage(src){

document.getElementById("zoomImg").src=src
document.getElementById("lightbox").style.display="flex"

}

function closeZoom(){

document.getElementById("lightbox").style.display="none"

}

/* ===== START ===== */

render()

</script>

</body>
</html>
