<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amazing Reptile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:black;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

button{
padding:10px 15px;
border:none;
background:black;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

.filter{
display:flex;
gap:10px;
margin-bottom:20px;
}

input,select{
padding:8px;
width:100%;
}

</style>

</head>
<body>

<header>
<h2>Amazing Reptile</h2>
<div>Premium Leopard Gecko Breeder</div>
</header>

<div class="container">

<h2>Available Gecko</h2>

<div class="filter">
<input id="morphFilter" placeholder="Filter morph">
<select id="sortPrice">
<option value="none">Sort Price</option>
<option value="low">Murah → Mahal</option>
<option value="high">Mahal → Murah</option>
</select>
</div>

<div id="products" class="grid"></div>

</div>

<script>

const products=[

{
name:"Tangerine Inferno",
morph:"Tangerine",
price:3500000,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg",
desc:"High orange saturation breeder line"
},

{
name:"Mack Snow Eclipse",
morph:"Mack Snow",
price:2800000,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg",
desc:"Beautiful Mack Snow genetics"
},

{
name:"Super Hypo",
morph:"Super Hypo",
price:5000000,
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg",
desc:"Breeder holdback quality"
}

]

function render(){

const morph=document.getElementById("morphFilter").value.toLowerCase()
const sort=document.getElementById("sortPrice").value

let list=[...products]

if(morph){
list=list.filter(p=>p.morph.toLowerCase().includes(morph))
}

if(sort==="low"){
list.sort((a,b)=>a.price-b.price)
}

if(sort==="high"){
list.sort((a,b)=>b.price-a.price)
}

const container=document.getElementById("products")
container.innerHTML=""

list.forEach(p=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${p.img}">
<div class="card-body">
<h4>${p.name}</h4>
<p>Morph: ${p.morph}</p>
<p>${p.desc}</p>
<b>Rp ${p.price.toLocaleString()}</b>
<br><br>
<button onclick="orderWhatsApp('${p.name}',${p.price})">
Order via WhatsApp
</button>
</div>
`

container.appendChild(card)

})

}

function orderWhatsApp(name,price){

let phone="6283805174938"

let message=`Halo Amazing Reptile, saya ingin membeli ${name} dengan harga Rp ${price}`

let url=`https://wa.me/${phone}?text=${encodeURIComponent(message)}`

window.open(url,'_blank')

}

document.getElementById("morphFilter").addEventListener("input",render)
document.getElementById("sortPrice").addEventListener("change",render)

render()

</script>

</body>
</html>
