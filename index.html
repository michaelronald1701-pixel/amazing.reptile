<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Amazing Reptile</title>

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:black;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
background:url("https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:40px;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */

.card{
background:#1a1a1a;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#00ff9d;
font-weight:bold;
}

.desc{
font-size:14px;
color:#ccc;
margin-top:5px;
}

/* BUTTON */

button{
padding:10px 15px;
border:none;
background:#00ff9d;
color:black;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#00cc7a;
}

/* BADGE */

.badge{
display:inline-block;
padding:5px 8px;
background:#00ff9d;
color:black;
border-radius:5px;
font-size:12px;
margin-bottom:5px;
}

.sold{
background:red;
color:white;
}

/* ADMIN */

.admin{
margin-bottom:20px;
}

.editBox{
display:none;
background:#222;
padding:10px;
margin-top:10px;
}

input,textarea,select{
width:100%;
padding:6px;
margin-top:5px;
}

textarea{
height:60px;
}

</style>

</head>

<body>

<nav>

<h2>Amazing Reptile</h2>

<div>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Gallery</a>
<a href="#">Contact</a>
</div>

</nav>

<div class="hero">

<h1>Premium Leopard Gecko Breeder</h1>
<p>Healthy • High Quality Morphs</p>

</div>

<div class="container">

<div class="admin">

<button onclick="adminLogin()">Admin Login</button>
<button onclick="addProduct()" id="addBtn" style="display:none;">Tambah Gecko</button>

</div>

<div id="products" class="grid"></div>

</div>

<script>

let admin=false
const password="123456"

let products=JSON.parse(localStorage.getItem("geckoProducts")) || []

if(products.length===0){

products=[

{
name:"Super Hypo Tangerine",
price:1500000,
desc:"High quality morph, healthy and ready to ship.",
img:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Leopard_gecko.jpg",
status:"available"
}

]

saveData()

}

function saveData(){
localStorage.setItem("geckoProducts",JSON.stringify(products))
}

function adminLogin(){

let input=prompt("Password Admin")

if(input===password){

admin=true
alert("Admin Mode Aktif")
document.getElementById("addBtn").style.display="inline-block"

render()

}else{

alert("Password salah")

}

}

function addProduct(){

products.push({
name:"Gecko Baru",
price:0,
desc:"Keterangan gecko...",
img:"",
status:"available"
})

saveData()
render()

}

function render(){

const container=document.getElementById("products")

container.innerHTML=""

products.forEach((p,i)=>{

let badge=p.status==="sold"
?'<div class="badge sold">SOLD</div>'
:'<div class="badge">AVAILABLE</div>'

let adminButtons=""
let editBox=""

if(admin){

adminButtons=`

<button onclick="toggleEdit(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Hapus</button>

`

editBox=`

<div class="editBox" id="edit${i}">

<input id="name${i}" value="${p.name}" placeholder="Nama Gecko">

<input id="price${i}" value="${p.price}" placeholder="Harga">

<textarea id="desc${i}" placeholder="Keterangan">${p.desc}</textarea>

<select id="status${i}">
<option value="available" ${p.status==="available"?"selected":""}>Available</option>
<option value="sold" ${p.status==="sold"?"selected":""}>Sold</option>
</select>

<input type="file" onchange="uploadImage(event,${i})">

<button onclick="saveEdit(${i})">Save</button>

</div>

`

}

const card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.img}">

<div class="card-body">

${badge}

<h3>${p.name}</h3>

<p class="price">Rp ${Number(p.price).toLocaleString()}</p>

<p class="desc">${p.desc}</p>

<button onclick="orderWhatsApp('${p.name}',${p.price})">

Order WhatsApp

</button>

${adminButtons}

${editBox}

</div>

`

container.appendChild(card)

})

}

function toggleEdit(i){

let box=document.getElementById("edit"+i)

box.style.display=
box.style.display==="block"
?"none"
:"block"

}

function saveEdit(i){

products[i].name=document.getElementById("name"+i).value
products[i].price=document.getElementById("price"+i).value
products[i].desc=document.getElementById("desc"+i).value
products[i].status=document.getElementById("status"+i).value

saveData()
render()

}

function deleteProduct(i){

if(confirm("Hapus gecko ini?")){

products.splice(i,1)

saveData()
render()

}

}

function uploadImage(event,i){

const file=event.target.files[0]

const reader=new FileReader()

reader.onload=function(e){

products[i].img=e.target.result

saveData()
render()

}

reader.readAsDataURL(file)

}

function orderWhatsApp(name,price){

let phone="6283805174938"

let message=Halo Amazing Reptile, saya ingin membeli ${name} harga Rp ${price}

let url=https://wa.me/${phone}?text=${encodeURIComponent(message)}

window.open(url,'_blank')

}

render()

</script>

</body>
</html>
